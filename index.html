<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<meta charset="UTF-8">
<title>Glenn's Apartment</title>

<!-- Luxury Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #eaeaea;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

/* Main Card */
.card {
    width: 100%;
    max-width: 420px;
    padding: 30px 20px;
    border-radius: 25px;
    text-align: center;
    background: linear-gradient(145deg, #0a1a2f, #0f2c4d);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    color: #f5f5f5;
    align-self: center;
    overflow: hidden;
}

/* Top Title */
.brand {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    letter-spacing: 4px;
    opacity: 0.85;
}

/* Main Heading */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    margin: 15px 0;
    letter-spacing: 2px;
}

/* Elegant Divider */
.divider {
    width: 60px;
    height: 2px;
    margin: 20px auto 30px;
    background: linear-gradient(to right, #caa74a, #f5d77a, #caa74a);
}

/* Premium Logo (Geometric) */
.logo-box {
    width: 90px;
    height: 90px;
    margin: 0 auto 30px;
    border: 2px solid #d4af37;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(212,175,55,0.2);
}

    .logo-box img {
    width: 60%;
    height: auto;
    object-fit: contain;
}


/* Menu List */
.menu {
    font-family: 'Montserrat', sans-serif;
    font-size: 17px;
    letter-spacing: 1.5px;
}

/* Each Item */
.menu-item {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
}
.line {
    flex: 1;
    max-width: 80px; /* prevents overflow */
    height: 1px;
    background: rgba(255,255,255,0.2);
    
}
/* Text */
.text {
    padding: 0 12px;
    white-space: nowrap;
}

/* Hover Effect */
.menu-item:hover .text {
    color: #d4af37;
    letter-spacing: 2px;
    transition: 0.3s;
}
.text a {
    text-decoration: none;
    color: #f5f5f5;
    display: inline-block;
    transition: 0.3s;
}

.menu-item:hover .text a {
    color: #d4af37;
    letter-spacing: 2px;
}
.menu {
    width: 100%;

}

</style>
</head>

<body>

<div class="card">

    <div class="brand">GLENN'S APARTMENT</div>

    <div class="title">MENU</div>

    <div class="divider"></div>

 <div class="logo-box">
    <img src="logo.png" alt="Logo">
</div>
    <div class="menu">

        <div class="menu-item">
            <div class="line"></div>
               <div class="text"><a href="menu.html">KITCHEN </a></div>
            <div class="line"></div>
        </div>

        <div class="menu-item">
            <div class="line"></div>
             <div class="text"><a href="DRINKS MENU.html">BAR </a></div>
            <div class="line"></div>
        </div>

        <div class="menu-item">
            <div class="line"></div>
             <div class="text"><a href="Tuck Shop.html">TUCK SHOP </a></div>
            <div class="line"></div>
        </div>

        <div class="menu-item">
            <div class="line"></div>
               <div class="text"><a href="Laundry.html">LAUNDRY </a></div>
            <div class="line"></div>
        </div>


</div>

</body>
</html>
