<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLENNS APARTMENT</title>
<style>
  body {
    font-family: 'Georgia', serif;
    background-color: #f7f2ee;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  h1 {
    color:aliceblue
  }
  .menu-card {
    background-color:#0b1830;
    width: 350px;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .menu-card h1 {
    font-size: 36px;
    margin: 10px 0;
    letter-spacing: 2px;
  }
  .menu-card p {
    font-size: 18px;
    margin: 5px 0;
    color: white
  }
  .circle {
    width: 120px;
    height: 120px;
    background-color: rgb(240, 235, 235)
    border-radius: 50%;
    margin: 20px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  
  .circle::before {
    transform: rotate(45deg);
  }
  .circle::after {
    transform: rotate(-45deg);
  }
  .highlight {
    background-color: white
    padding: 5px 10px;
    border-radius: 5px;
    display: inline-block;
    margin-top: 15px;
  }
  .site {
    margin-top: 10px;
    font-size: 14px;
    color: #f7f6f5;
  }
  /* Style links inside the site div */
  .site a {
    color: #f7f3f1;
    text-decoration: none;
  }
  .site a:hover {
    text-decoration: underline;
  }
  .image-container {
    display:flex;
    justify-content: center;
    margin: 20px 0; /* space above & below */
}

.image-container img {
    width: 150px; /* adjust size */
    height: 50;
    border-radius: 10px; /* optional: rounded edges */
}
</style>
</head>
<body>
  <div class="menu-card">
    <p>GLENN'S APARTMENT</p>
    <h1>MENU/PRICE LIST</h1>
    <div class="image-container">
      <img src="logo.png" alt="menu image">
    </div>
 
    <div class="site"><a href="menu.html">KITCHEN </a></div>
    <div class="site"><a href="DRINKS MENU.html">BAR </a></div>
    <div class="site"><a href="Tuck Shop.html">TUCK SHOP </a></div>
    <div class="site"><a href="Laundry.html">LAUNDRY </a></div>
  </div>
</body>
</html>
